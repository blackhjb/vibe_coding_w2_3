name: Issue Auto Labeler

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    
    steps:
    - name: Auto-label Issue
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const issue = context.payload.issue;
          const title = issue.title.toLowerCase();
          const body = issue.body ? issue.body.toLowerCase() : '';
          
          let labels = [];
          
          // 이슈 타입 기반 라벨링
          if (title.includes('[bug]') || title.includes('버그') || title.includes('오류') || 
              title.includes('error') || body.includes('버그') || body.includes('오류')) {
            labels.push('bug');
          }
          
          if (title.includes('[feature]') || title.includes('기능') || title.includes('요청') ||
              title.includes('feature') || body.includes('새로운 기능') || body.includes('기능 추가')) {
            labels.push('feature');
          }
          
          if (title.includes('[enhancement]') || title.includes('개선') || title.includes('향상') ||
              body.includes('개선') || body.includes('향상')) {
            labels.push('enhancement');
          }
          
          if (title.includes('[question]') || title.includes('질문') || title.includes('문의') ||
              body.includes('질문') || body.includes('문의') || body.includes('어떻게')) {
            labels.push('question');
          }
          
          if (title.includes('[docs]') || title.includes('문서') || title.includes('documentation') ||
              body.includes('문서') || body.includes('가이드')) {
            labels.push('documentation');
          }
          
          // 컴포넌트 기반 라벨링
          if (title.includes('backend') || title.includes('api') || title.includes('server') ||
              body.includes('백엔드') || body.includes('서버') || body.includes('api')) {
            labels.push('backend');
          }
          
          if (title.includes('frontend') || title.includes('ui') || title.includes('사용자') ||
              body.includes('프론트엔드') || body.includes('인터페이스') || body.includes('화면')) {
            labels.push('frontend');
          }
          
          if (title.includes('test') || title.includes('테스트') || 
              body.includes('테스트') || body.includes('검증')) {
            labels.push('test');
          }
          
          // 우선순위 라벨링
          if (title.includes('urgent') || title.includes('critical') || title.includes('긴급') ||
              body.includes('긴급') || body.includes('즉시') || body.includes('critical')) {
            labels.push('priority-high');
          } else if (title.includes('important') || title.includes('중요') ||
                     body.includes('중요') || body.includes('우선')) {
            labels.push('priority-medium');
          } else {
            labels.push('priority-low');
          }
          
          // 난이도 라벨링
          if (title.includes('simple') || title.includes('easy') || title.includes('간단') ||
              body.includes('간단') || body.includes('쉬운')) {
            labels.push('good first issue');
          }
          
          if (title.includes('help') || title.includes('도움') || 
              body.includes('도움') || body.includes('지움')) {
            labels.push('help wanted');
          }
          
          // 중복 제거
          labels = [...new Set(labels)];
          
          // 라벨 적용
          if (labels.length > 0) {
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issue.number,
              labels
            });
            
            console.log(`Added labels to issue #${issue.number}: ${labels.join(', ')}`);
            
            // 라벨링 완료 댓글
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: `🏷️ **자동 라벨링 완료**\n\n추가된 라벨: ${labels.map(l => `\`${l}\``).join(', ')}\n\n라벨은 이슈 내용을 기반으로 자동으로 추가되었습니다. 필요시 수동으로 수정하실 수 있습니다.`
            });
          } 